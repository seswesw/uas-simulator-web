services:
  mysql:
    image: mysql:8.0
    container_name: uas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 322Seswesw/
      MYSQL_DATABASE: uas_db
      MYSQL_USER: root
      MYSQL_PASSWORD: 322Seswesw/
    ports:
      - "3308:3306"
    volumes:
      - uas-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  uas-mysql-data:
