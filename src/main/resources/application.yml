spring:
  application:
    name: uas-simulator-web
  profiles:
    # По умолчанию проект работает с MySQL, а не с локальной H2-базой data/uas-db.mv.db.
    # Для старого режима можно явно запустить профиль h2: mvn spring-boot:run -Dspring-boot.run.profiles=h2
    default: mysql
  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

simulator:
  tick-interval-ms: 500
  default-speed-ms: 12.0
  home-latitude: 55.751244
  home-longitude: 37.618423
